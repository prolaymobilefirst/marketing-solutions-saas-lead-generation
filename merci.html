  <div id="site-header"></div>

  <main>
    <div class="thankyou-wrapper">
      <div class="thankyou-card">
        <div class="thankyou-icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l6 6L20 6"/></svg>

  <script>
  (function () {
    var seconds = 8;
    var countdownEl = document.getElementById('thankyou-countdown');
    var timer = setInterval(function () {
      seconds -= 1;
      if (countdownEl) countdownEl.textContent = String(Math.max(seconds, 0));
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  })();
  </script>
