[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  # server/assets/*.pdf: the lead-magnet library (admin/sections/pdf.php lets
  # an admin add more and pick which one is active). content/site-settings.json:
  # holds that active-file choice, read by download-pdf.js at request time.
  included_files = ["server/assets/*.pdf", "content/site-settings.json"]

# Proxy /api/* to Netlify Functions so client-side code can use the same
# path on Netlify and Vercel.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# The PDF must never be reachable as a static file — these are defense in
# depth (the file isn't published under these paths to begin with).
[[redirects]]
  from = "/downloads/*"
  to = "/"
  status = 302
  force = true

[[redirects]]
  from = "/server/*"
  to = "/"
  status = 302
  force = true

[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  force = false
